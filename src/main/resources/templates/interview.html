<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview — Interview Prep Bot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f4f8; }
        .question-card { border-left: 4px solid #0d6efd; }
        .score-badge-10, .score-badge-9 { background-color: #198754; }
        .score-badge-8, .score-badge-7 { background-color: #20c997; }
        .score-badge-6, .score-badge-5 { background-color: #ffc107; color: #000 !important; }
        .score-badge-4, .score-badge-3 { background-color: #fd7e14; }
        .score-badge-2, .score-badge-1, .score-badge-0 { background-color: #dc3545; }
        .answer-textarea { resize: vertical; min-height: 140px; }
        .previous-answer { background-color: #e8f4fd; border-radius: 6px; }
        .model-answer { background-color: #d1e7dd; border-radius: 6px; }
        .spinner-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: white;
        }
        .spinner-overlay.active { display: flex; }
    </style>
</head>
<body>

<!-- Loading Overlay -->
<div class="spinner-overlay" id="loadingOverlay">
    <div class="spinner-border text-light mb-3" style="width:3rem;height:3rem;" role="status"></div>
    <p class="fs-5">Evaluating your answer &amp; generating next question...</p>
</div>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4 py-2">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-robot me-2"></i>Interview Prep Bot
    </span>
    <div class="d-flex gap-2 align-items-center">
        <span class="badge bg-info text-dark" th:text="${interviewSession.category}"></span>
        <span class="badge"
              th:classappend="${interviewSession.difficulty == 'Beginner'} ? 'bg-success' : (${interviewSession.difficulty == 'Intermediate'} ? 'bg-warning text-dark' : 'bg-danger')"
              th:text="${interviewSession.difficulty}"></span>
        <span class="badge bg-purple text-white" style="background-color:#6f42c1;"
              th:if="${interviewSession.company != null and interviewSession.company != 'General'}"
              th:text="${interviewSession.company}"></span>
    </div>
</nav>

<div class="container py-4" style="max-width: 800px;">

    <!-- Progress -->
    <div class="mb-4">
        <div class="d-flex justify-content-between mb-1">
            <span class="fw-semibold">Question <span th:text="${interviewSession.currentQuestionNumber}"></span> of <span th:text="${maxQuestions}"></span></span>
            <span class="text-muted" th:text="${interviewSession.completedPairs.size()} + ' answered'"></span>
        </div>
        <div class="progress" style="height: 8px;">
            <div class="progress-bar bg-primary" role="progressbar"
                 th:style="'width: ' + ${(interviewSession.currentQuestionNumber - 1) * 100 / maxQuestions} + '%'"></div>
        </div>
    </div>

    <!-- Current Question -->
    <div class="card question-card shadow-sm mb-4">
        <div class="card-body p-4">
            <p class="text-muted small mb-2"><i class="bi bi-question-circle me-1"></i>Current Question</p>
            <p class="fs-5 fw-semibold mb-0" th:text="${interviewSession.currentQuestion}"></p>
        </div>
    </div>

    <!-- Answer Form -->
    <form action="/answer" method="post" id="answerForm">
        <div class="card shadow-sm mb-3">
            <div class="card-body p-4">
                <label for="answer" class="form-label fw-semibold">Your Answer</label>
                <textarea class="form-control answer-textarea" id="answer" name="answer"
                          placeholder="Type your answer here..."></textarea>
            </div>
        </div>
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-grow-1" onclick="showLoading()">
                <i class="bi bi-send me-2"></i>Submit Answer
            </button>
            <button type="button" class="btn btn-outline-danger" data-bs-toggle="modal" data-bs-target="#endModal">
                <i class="bi bi-stop-circle me-1"></i>End Interview
            </button>
        </div>
    </form>

    <!-- Previous Q&As -->
    <div th:if="${not #lists.isEmpty(session.completedPairs)}" class="mt-5">
        <h6 class="text-muted fw-semibold mb-3">
            <i class="bi bi-clock-history me-1"></i>Previous Questions
        </h6>
        <div class="accordion" id="previousQA">
            <div th:each="pair, stat : ${#lists.reverse(session.completedPairs)}" class="accordion-item mb-2 border rounded">
                <h2 class="accordion-header">
                    <button class="accordion-button collapsed rounded" type="button"
                            data-bs-toggle="collapse"
                            th:data-bs-target="'#qa-' + ${pair.questionNumber}">
                        <span class="badge text-white me-3"
                              th:classappend="'score-badge-' + ${pair.score}"
                              th:text="${pair.score} + '/10'"></span>
                        <span class="text-truncate" style="max-width: 500px;" th:text="'Q' + ${pair.questionNumber} + ': ' + ${pair.question}"></span>
                    </button>
                </h2>
                <div th:id="'qa-' + ${pair.questionNumber}" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <p class="text-muted small fw-semibold mb-1">Your Answer</p>
                        <div class="previous-answer p-3 mb-3">
                            <p class="mb-0" th:text="${#strings.isEmpty(pair.userAnswer)} ? '(No answer provided)' : ${pair.userAnswer}"></p>
                        </div>
                        <p class="text-muted small fw-semibold mb-1">Feedback</p>
                        <p th:text="${pair.feedback}"></p>
                        <p class="text-muted small fw-semibold mb-1">Model Answer</p>
                        <div class="model-answer p-3">
                            <p class="mb-0" th:text="${pair.modelAnswer}"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<!-- End Interview Modal -->
<div class="modal fade" id="endModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">End Interview Early?</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-muted">
                You still have questions remaining. Your answers so far will be shown in the summary.
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Continue Interview</button>
                <form action="/end" method="post" class="d-inline">
                    <button type="submit" class="btn btn-danger">End & See Summary</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function showLoading() {
        document.getElementById('loadingOverlay').classList.add('active');
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary — Interview Prep Bot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f4f8; }
        .score-circle {
            width: 140px; height: 140px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            margin: 0 auto;
            font-weight: bold;
        }
        .score-excellent { background: linear-gradient(135deg, #198754, #20c997); color: white; }
        .score-good      { background: linear-gradient(135deg, #20c997, #0dcaf0); color: white; }
        .score-fair      { background: linear-gradient(135deg, #ffc107, #fd7e14); color: white; }
        .score-poor      { background: linear-gradient(135deg, #dc3545, #fd7e14); color: white; }
        .score-badge-10, .score-badge-9 { background-color: #198754 !important; }
        .score-badge-8,  .score-badge-7 { background-color: #20c997 !important; }
        .score-badge-6,  .score-badge-5 { background-color: #ffc107 !important; color: #000 !important; }
        .score-badge-4,  .score-badge-3 { background-color: #fd7e14 !important; }
        .score-badge-2,  .score-badge-1, .score-badge-0 { background-color: #dc3545 !important; }
        .model-answer { background-color: #d1e7dd; border-radius: 6px; }
        .user-answer  { background-color: #e8f4fd; border-radius: 6px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark px-4 py-2">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-robot me-2"></i>Interview Prep Bot
    </span>
</nav>

<div class="container py-5" style="max-width: 800px;">

    <!-- Score Header -->
    <div class="text-center mb-5">
        <h2 class="fw-bold mb-4">Interview Complete!</h2>

        <!-- Score Circle -->
        <div class="score-circle mb-3"
             th:classappend="${avgScoreRaw >= 8} ? 'score-excellent' : (${avgScoreRaw >= 6} ? 'score-good' : (${avgScoreRaw >= 4} ? 'score-fair' : 'score-poor'))">
            <span style="font-size: 2.5rem;" th:text="${avgScore}"></span>
            <span style="font-size: 0.9rem;">out of 10</span>
        </div>

        <!-- Performance Label -->
        <h4 class="fw-semibold mt-3"
            th:text="${avgScoreRaw >= 8} ? '🏆 Excellent Performance!' : (${avgScoreRaw >= 6} ? '👍 Good Job!' : (${avgScoreRaw >= 4} ? '📈 Keep Practicing!' : '💪 Needs More Practice'))">
        </h4>
        <p class="text-muted">
            <span class="badge bg-info text-dark me-1" th:text="${interviewSession.category}"></span>
            <span class="badge me-1"
                  th:classappend="${interviewSession.difficulty == 'Beginner'} ? 'bg-success' : (${interviewSession.difficulty == 'Intermediate'} ? 'bg-warning text-dark' : 'bg-danger')"
                  th:text="${interviewSession.difficulty}"></span>
            <span class="badge me-1 text-white"
                  style="background-color:#6f42c1;"
                  th:if="${interviewSession.company != null and interviewSession.company != 'General'}"
                  th:text="${interviewSession.company}"></span>
            <span th:text="${interviewSession.completedPairs.size()} + ' questions answered'"></span>
        </p>
    </div>

    <!-- Q&A Breakdown -->
    <h5 class="fw-bold mb-3"><i class="bi bi-list-check me-2"></i>Full Breakdown</h5>
    <div class="accordion mb-5" id="summaryAccordion">
        <div th:each="pair : ${interviewSession.completedPairs}" class="accordion-item mb-3 border rounded shadow-sm">
            <h2 class="accordion-header">
                <button class="accordion-button collapsed rounded" type="button"
                        data-bs-toggle="collapse"
                        th:data-bs-target="'#sum-' + ${pair.questionNumber}">
                    <span class="badge text-white me-3"
                          th:classappend="'score-badge-' + ${pair.score}"
                          th:text="${pair.score} + '/10'"></span>
                    <span th:text="'Q' + ${pair.questionNumber} + ': ' + ${pair.question}"></span>
                </button>
            </h2>
            <div th:id="'sum-' + ${pair.questionNumber}" class="accordion-collapse collapse">
                <div class="accordion-body">
                    <p class="text-muted small fw-semibold mb-1">Your Answer</p>
                    <div class="user-answer p-3 mb-3">
                        <p class="mb-0" th:text="${#strings.isEmpty(pair.userAnswer)} ? '(No answer provided)' : ${pair.userAnswer}"></p>
                    </div>
                    <p class="text-muted small fw-semibold mb-1">Feedback</p>
                    <p th:text="${pair.feedback}"></p>
                    <p class="text-muted small fw-semibold mb-1">Model Answer</p>
                    <div class="model-answer p-3">
                        <p class="mb-0" th:text="${pair.modelAnswer}"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Actions -->
    <div class="text-center d-flex gap-3 justify-content-center">
        <form action="/reset" method="post">
            <button type="submit" class="btn btn-primary btn-lg px-5">
                <i class="bi bi-arrow-clockwise me-2"></i>Start New Interview
            </button>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error — Interview Prep Bot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background-color: #f0f4f8; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4 py-2">
    <span class="navbar-brand fw-bold">
        <i class="bi bi-robot me-2"></i>Interview Prep Bot
    </span>
</nav>

<div class="container py-5 text-center" style="max-width: 600px;">
    <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 4rem;"></i>
    <h2 class="fw-bold mt-3" th:text="${errorTitle}">Error</h2>
    <p class="text-muted mt-2" th:text="${errorMessage}"></p>
    <a href="/" class="btn btn-primary mt-3">
        <i class="bi bi-house me-2"></i>Go Home
    </a>
</div>
</body>
</html>

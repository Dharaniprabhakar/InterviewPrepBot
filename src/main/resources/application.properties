spring.application.name=ChatBotSBApplication

# Groq API — set GROQ_API_KEY as environment variable
groq.api.key=${GROQ_API_KEY}
groq.api.model=llama-3.3-70b-versatile

# Thymeleaf
spring.thymeleaf.cache=false

# Port — Railway injects PORT automatically, fallback to 8080 locally
server.port=${PORT:8080}
